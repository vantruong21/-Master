# Server configuration
server.port=${PORT:8080}

# Database configuration (Thay đổi theo thông tin thực tế của bạn)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:j_custom_deck}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Batch Processing for performance
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Security (Tạm thời cho phép truy cập mọi request để phát triển giai đoạn đầu)
# spring.security.user.name=admin
# spring.security.user.password=admin

# JWT Configuration
jwt.secret=JCustomDeck2026SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!!
jwt.expiration=86400000

# App CORS Allowed Origins configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
